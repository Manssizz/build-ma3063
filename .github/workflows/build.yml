name: Build OpenWrt — Ruijie RG-MA3063

# TFTP BOOT (test initramfs via U-Boot):
#   ipaddr   = 192.168.10.10  (router di U-Boot)
#   serverip = 192.168.10.19  (PC/TFTP server)
#
#   setenv serverip <IP_PC>
#   tftpboot 0x44000000 openwrt-qualcommax-ipq50xx-ruijie_rg-ma3063-initramfs-uImage.itb
#   bootm 0x44000000#config@mp03.5-c2
#
# U-Boot OEM 32-bit, ATF handle switch ke arm64.
# Confirmed: strings /dev/mtd11 -> "Jumping to AARCH64 kernel via monitor"

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (hapus cache)'
        required: false
        default: 'false'
        type: boolean

env:
  OPENWRT_BRANCH: openwrt-25.12
  TARGET: qualcommax
  SUBTARGET: ipq50xx

  # Path di openwrt-25.12 (hardcoded, sudah diverifikasi dari repo)
  DTS_DIR: target/linux/qualcommax/files/arch/arm64/boot/dts/qcom
  DEVICE_MK: target/linux/qualcommax/image/ipq50xx.mk
  BOARD_NET: target/linux/qualcommax/ipq50xx/base-files/etc/board.d/02_network
  FW_DIR: target/linux/qualcommax/ipq50xx/base-files/lib/firmware/ath11k

jobs:
  build:
    name: Build OpenWrt for Ruijie RG-MA3063
    runs-on: ubuntu-24.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync unzip zlib1g-dev \
            file wget curl libelf-dev quilt u-boot-tools \
            automake autoconf libtool

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 -b ${{ env.OPENWRT_BRANCH }} \
            https://github.com/openwrt/openwrt.git openwrt
          echo "=== Commit ==="
          cd openwrt && git log --oneline -1

      - name: Verify OpenWrt tree structure
        run: |
          echo "=== qualcommax/ ==="
          ls openwrt/target/linux/qualcommax/

          echo ""
          echo "=== Verify DTS dir: ${{ env.DTS_DIR }} ==="
          ls openwrt/${{ env.DTS_DIR }} | grep "ipq5018" | head -10

          echo ""
          echo "=== Verify Device MK: ${{ env.DEVICE_MK }} ==="
          grep -c "define Device" openwrt/${{ env.DEVICE_MK }} \
            && echo "OK — device definitions ada" \
            || echo "WARN — tidak ada device definitions"

          echo ""
          echo "=== ipq50xx/ ==="
          find openwrt/target/linux/qualcommax/ipq50xx -maxdepth 2 | sort

      - name: Validate required files in repo
        run: |
          echo "=== Checking repo files ==="
          test -f files/dts/ipq5018-ruijie-rg-ma3063.dts \
            || (echo "MISSING: DTS" && exit 1)
          test -f files/config/ma3063.config \
            || (echo "MISSING: config" && exit 1)
          test -f files/patches/device-makefile-entry.txt \
            || (echo "MISSING: device-makefile-entry.txt" && exit 1)
          test -f files/firmware/ipq5018/bdwlan.b23 \
            || (echo "MISSING: ipq5018/bdwlan.b23" && exit 1)
          test -f files/firmware/qcn6122/bdwlan.b60 \
            || (echo "MISSING: qcn6122/bdwlan.b60" && exit 1)
          test -f files/firmware/qcn6122/m3_fw.mdt \
            || (echo "MISSING: qcn6122/m3_fw.mdt" && exit 1)
          test -f files/firmware/qcn6122/q6_fw.mdt \
            || (echo "MISSING: qcn6122/q6_fw.mdt" && exit 1)
          echo "✅ Semua file OK"
          echo ""
          echo "=== IPQ5018 firmware ==="
          ls -lh files/firmware/ipq5018/
          echo ""
          echo "=== QCN6122 firmware ==="
          ls -lh files/firmware/qcn6122/

      - name: Copy DTS and firmware to OpenWrt tree
        run: |
          mkdir -p openwrt/${{ env.FW_DIR }}/IPQ5018/hw1.0
          mkdir -p openwrt/${{ env.FW_DIR }}/QCN6122/hw1.0

          echo "=== Copy DTS ==="
          cp -v files/dts/ipq5018-ruijie-rg-ma3063.dts \
            openwrt/${{ env.DTS_DIR }}/

          echo ""
          echo "=== Copy IPQ5018 BDF (semua variant + board.bin) ==="
          cp -v files/firmware/ipq5018/bdwlan.* \
            openwrt/${{ env.FW_DIR }}/IPQ5018/hw1.0/
          cp -v files/firmware/ipq5018/bdwlan.b23 \
            openwrt/${{ env.FW_DIR }}/IPQ5018/hw1.0/board.bin

          echo ""
          echo "=== Copy QCN6122 BDF (semua variant + board.bin) ==="
          cp -v files/firmware/qcn6122/bdwlan.* \
            openwrt/${{ env.FW_DIR }}/QCN6122/hw1.0/
          cp -v files/firmware/qcn6122/bdwlan.b60 \
            openwrt/${{ env.FW_DIR }}/QCN6122/hw1.0/board.bin

          echo ""
          echo "=== Copy QCN6122 DSP firmware ==="
          cp -v files/firmware/qcn6122/m3_fw.* \
            openwrt/${{ env.FW_DIR }}/QCN6122/hw1.0/
          cp -v files/firmware/qcn6122/q6_fw.* \
            openwrt/${{ env.FW_DIR }}/QCN6122/hw1.0/

          echo ""
          echo "=== Final firmware layout ==="
          find openwrt/${{ env.FW_DIR }} -type f | sort


      - name: Debug — dump reference DTS and check our DTS syntax
        run: |
          echo "=== Referensi DTS device lain (ipq5018-linksys-mx2000.dts) ==="
          cat openwrt/${{ env.DTS_DIR }}/ipq5018-linksys-mx2000.dts || echo "(tidak ada)"

          echo ""
          echo "=== ipq5018.dtsi node names (grep label) ==="
          grep -E "^[a-z].*: [a-z].*@"             openwrt/build_dir/target-*/linux-qualcommax_ipq50xx/linux-*/arch/arm64/boot/dts/qcom/ipq5018.dtsi             2>/dev/null | head -40 ||           find openwrt -name "ipq5018.dtsi" 2>/dev/null | head -3

          echo ""
          echo "=== DTS kita (ipq5018-ruijie-rg-ma3063.dts) ==="
          cat openwrt/${{ env.DTS_DIR }}/ipq5018-ruijie-rg-ma3063.dts

      - name: Apply patches to OpenWrt tree
        run: |
          cd openwrt

          # ── Patch 1: DTS Makefile ────────────────────────────────────────────
          # Di 25.12 / kernel 6.12, DTB di-build otomatis dari DEVICE_DTS —
          # tidak perlu entry di DTS Makefile. Skip kalau file tidak ada.
          echo "=== Patch 1: DTS Makefile ==="
          DTS_MK="${{ env.DTS_DIR }}/Makefile"
          if [ ! -f "$DTS_MK" ]; then
            echo "⏭ Makefile tidak ada — kernel 6.12 discover DTB otomatis, skip"
          elif ! grep -q "ipq5018-ruijie-rg-ma3063" "$DTS_MK"; then
            echo "before:" && grep "ipq5018" "$DTS_MK" | tail -3
            sed -i "/ipq5018-.*\.dtb/a\dtb-\$(CONFIG_ARCH_QCOM) += ipq5018-ruijie-rg-ma3063.dtb" "$DTS_MK"
            echo "after:" && grep "ipq5018-ruijie" "$DTS_MK"
            echo "✅ Patched"
          else
            echo "⏭ Sudah ada, skip"
          fi

          # ── Patch 2: Tambah device entry ke qualcommax/Makefile ──────────────
          echo ""
          echo "=== Patch 2: Device entry (${{ env.DEVICE_MK }}) ==="
          if ! grep -q "ruijie_rg-ma3063" "${{ env.DEVICE_MK }}"; then
            cat "../files/patches/device-makefile-entry.txt" >> "${{ env.DEVICE_MK }}"
            echo "✅ Patched"
            echo "--- verifikasi ---"
            grep -A5 "ruijie_rg-ma3063" "${{ env.DEVICE_MK }}" | head -8
          else
            echo "⏭ Sudah ada, skip"
          fi

          # ── Patch 3: Network board config ────────────────────────────────────
          echo ""
          echo "=== Patch 3: 02_network ==="
          BOARD_NET="${{ env.BOARD_NET }}"
          mkdir -p "$(dirname $BOARD_NET)"
          if [ ! -f "$BOARD_NET" ]; then
            echo "File belum ada, buat baru"
            python3 ../scripts/make_board_net.py "$BOARD_NET"
            echo "✅ Dibuat baru"
          elif ! grep -q "ruijie,rg-ma3063" "$BOARD_NET"; then
            python3 -c "
          import re
          f = '$BOARD_NET'
          c = open(f).read()
          # 25.12 pakai fungsi ipq50xx_setup_interfaces() dengan case di dalamnya
          # Sisipkan entry sebelum esac terakhir di dalam fungsi
          entry = '\truijie,rg-ma3063)\n\t\tucidef_set_interfaces_lan_wan \"lan1 lan2 lan3\" \"wan\"\n\t\t;;\n\t'
          # match baris 'esac' yang diawali whitespace (di dalam fungsi)
          c = re.sub(r'(\tesac)', entry + r'\1', c, count=1)
          open(f, 'w').write(c)
          "
            echo "✅ Patched"
          else
            echo "⏭ Sudah ada, skip"
          fi
          echo "--- 02_network ---"
          cat "$BOARD_NET"

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache toolchain
        if: inputs.clean_build != 'true'
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir/toolchain-*
            openwrt/staging_dir/host
            openwrt/build_dir/host
            openwrt/build_dir/hostpkg
          key: toolchain-25.12-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ hashFiles('openwrt/include/version.mk', 'openwrt/toolchain/Makefile') }}
          restore-keys: |
            toolchain-25.12-${{ env.TARGET }}-${{ env.SUBTARGET }}-

      - name: Generate build config
        run: |
          cp -v files/config/ma3063.config openwrt/.config
          cd openwrt && make defconfig 2>&1 | tail -3
          echo ""
          echo "=== Active config ==="
          grep -E "^CONFIG_TARGET|DEVICE_ruijie|PACKAGE_luci|PACKAGE_ath11k|PACKAGE_kmod-ath11k" .config

      - name: Build toolchain
        run: |
          cd openwrt
          make toolchain/install -j$(nproc) V=s 2>&1 | tail -5
          echo "✅ Toolchain done"

      - name: Build firmware image
        run: |
          cd openwrt
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log | \
            grep -E "make\[1\]|ERROR:|error:|WARNING:|Built target|ruijie|ath11k" || true
          echo ""
          echo "=== Output files ==="
          find bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/ \
            -maxdepth 1 -type f | sort

      - name: Verify FIT image config selector
        run: |
          BINDIR="openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}"
          ITB=$(find "$BINDIR" -name "*ruijie*initramfs*.itb" 2>/dev/null | head -1)
          if [ -z "$ITB" ]; then
            echo "initramfs .itb tidak ditemukan, skip"
            exit 0
          fi
          echo "=== FIT configs: $(basename $ITB) ==="
          dumpimage -l "$ITB" | grep "config@"
          echo ""
          if dumpimage -l "$ITB" | grep -q "config@mp03.5-c2"; then
            echo "✅ config@mp03.5-c2 ada"
            echo "   bootm 0x44000000#config@mp03.5-c2"
          else
            echo "⚠️  config@mp03.5-c2 tidak ada — lihat daftar config di atas"
            echo "   Update DEVICE_DTS_CONFIG di files/patches/device-makefile-entry.txt"
          fi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          BINDIR="openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}"
          find "$BINDIR" -name "*ruijie*initramfs*" -exec cp -v {} artifacts/ \;
          find "$BINDIR" -name "*ruijie*sysupgrade*" -exec cp -v {} artifacts/ \;
          cp openwrt/.config artifacts/dotconfig
          find "$BINDIR" -name "*.manifest" -exec cp -v {} artifacts/ \;
          find "$BINDIR" -name "sha256sums"  -exec cp -v {} artifacts/ \;
          echo ""
          echo "=== Artifacts ==="
          ls -lh artifacts/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ruijie-rg-ma3063-${{ github.run_number }}
          path: artifacts/
          retention-days: 14

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: /tmp/build.log
          retention-days: 7
