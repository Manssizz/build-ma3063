name: Build OpenWrt — Ruijie RG-MA3063

# TFTP BOOT (test initramfs via U-Boot):
#   ipaddr   = 192.168.10.10  (router)
#   serverip = 192.168.10.19  (PC/TFTP server)
#   setenv serverip <IP_PC>
#   tftpboot 0x44000000 openwrt-qualcommax-ipq50xx-ruijie_rg-ma3063-initramfs-uImage.itb
#   bootm 0x44000000#config@mp03.5-c2
#
# U-Boot OEM 32-bit, ATF handle switch ke arm64.
# Confirmed: "Jumping to AARCH64 kernel via monitor"

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (hapus cache)'
        required: false
        default: 'false'
        type: boolean

env:
  OPENWRT_BRANCH: openwrt-25.12
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE_PROFILE: ruijie_rg-ma3063

jobs:
  build:
    name: Build OpenWrt for Ruijie RG-MA3063
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget curl libelf-dev quilt u-boot-tools

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 -b ${{ env.OPENWRT_BRANCH }} \
            https://github.com/openwrt/openwrt.git openwrt
          echo "=== OpenWrt commit ==="
          cd openwrt && git log --oneline -1

      - name: Detect OpenWrt tree structure
        run: |
          echo "=== target/linux/qualcommax/ ==="
          ls -la openwrt/target/linux/qualcommax/

          echo ""
          echo "=== Detect DTS directory ==="
          if [ -d "openwrt/target/linux/qualcommax/dts" ]; then
            DTS_DIR="openwrt/target/linux/qualcommax/dts"
            echo "Struktur baru (main/6.12): DTS di qualcommax/dts/"
          else
            DTS_DIR=$(find openwrt/target/linux/qualcommax \
              -type d -name "qcom" -path "*/boot/dts/qcom" 2>/dev/null | head -1)
            if [ -z "$DTS_DIR" ]; then
              echo "ERROR: DTS directory tidak ditemukan!"
              find openwrt/target/linux/qualcommax -maxdepth 4 -type d | sort
              exit 1
            fi
            echo "Struktur lama: DTS di $DTS_DIR"
          fi
          echo "DTS_DIR=$DTS_DIR" >> $GITHUB_ENV
          echo "DTS_DIR=$DTS_DIR"

          echo ""
          echo "=== Isi DTS dir ==="
          ls "$DTS_DIR/" | grep -i "ipq5018\|ipq50" | head -20 || ls "$DTS_DIR/" | head -20

          echo ""
          echo "=== Detect DEVICE_MK (device definitions Makefile) ==="
          # Di 25.12, device definitions bisa di root qualcommax/Makefile
          # atau di ipq50xx/Makefile — detect otomatis
          if [ -f "openwrt/target/linux/qualcommax/ipq50xx/Makefile" ]; then
            DEVICE_MK="target/linux/qualcommax/ipq50xx/Makefile"
            echo "✅ Device MK: ipq50xx/Makefile (struktur lama)"
          elif grep -q "define Device" "openwrt/target/linux/qualcommax/Makefile" 2>/dev/null; then
            DEVICE_MK="target/linux/qualcommax/Makefile"
            echo "✅ Device MK: qualcommax/Makefile (struktur 25.12)"
          else
            # Cari di semua Makefile di bawah qualcommax
            FOUND=$(grep -rl "define Device" openwrt/target/linux/qualcommax/               --include="Makefile" 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              DEVICE_MK="${FOUND#openwrt/}"
              echo "✅ Device MK: $DEVICE_MK (ditemukan via grep)"
            else
              echo "⚠️  Device Makefile tidak ditemukan — akan append ke ipq50xx/Makefile"
              DEVICE_MK="target/linux/qualcommax/ipq50xx/Makefile"
            fi
          fi
          echo "DEVICE_MK=$DEVICE_MK" >> $GITHUB_ENV
          echo ""
          echo "=== Cuplikan device definitions yang ada ==="
          grep -n "define Device\|TARGET_DEVICES" "openwrt/$DEVICE_MK" 2>/dev/null | head -20             || echo "(kosong)"

          echo ""
          echo "=== Detect 02_network path ==="
          BOARD_NET=$(find openwrt/target/linux/qualcommax -name "02_network"             -path "*/board.d/02_network" 2>/dev/null | head -1)
          if [ -n "$BOARD_NET" ]; then
            BOARD_NET="${BOARD_NET#openwrt/}"
            echo "✅ board.d/02_network: $BOARD_NET"
            cat "openwrt/$BOARD_NET"
          else
            BOARD_NET="target/linux/qualcommax/ipq50xx/base-files/etc/board.d/02_network"
            echo "⚠️  02_network tidak ditemukan, default: $BOARD_NET"
          fi
          echo "BOARD_NET=$BOARD_NET" >> $GITHUB_ENV

          echo ""
          echo "=== Isi ipq50xx/ ==="
          find openwrt/target/linux/qualcommax/ipq50xx -maxdepth 3 | sort

      - name: Validate required files in repo
        run: |
          echo "=== Required files ==="
          test -f files/dts/ipq5018-ruijie-rg-ma3063.dts \
            || (echo "MISSING: files/dts/ipq5018-ruijie-rg-ma3063.dts" && exit 1)
          test -f files/config/ma3063.config \
            || (echo "MISSING: files/config/ma3063.config" && exit 1)
          test -f files/patches/device-makefile-entry.txt \
            || (echo "MISSING: files/patches/device-makefile-entry.txt" && exit 1)
          test -f files/firmware/ipq5018/bdwlan.b23 \
            || (echo "MISSING: files/firmware/ipq5018/bdwlan.b23" && exit 1)
          test -f files/firmware/qcn6122/bdwlan.b60 \
            || (echo "MISSING: files/firmware/qcn6122/bdwlan.b60" && exit 1)
          test -f files/firmware/qcn6122/m3_fw.mdt \
            || (echo "MISSING: files/firmware/qcn6122/m3_fw.mdt" && exit 1)
          test -f files/firmware/qcn6122/q6_fw.mdt \
            || (echo "MISSING: files/firmware/qcn6122/q6_fw.mdt" && exit 1)
          echo "All files OK"

          echo ""
          echo "=== files/firmware/ipq5018/ ==="
          ls -lh files/firmware/ipq5018/
          echo ""
          echo "=== files/firmware/qcn6122/ ==="
          ls -lh files/firmware/qcn6122/

      - name: Copy DTS and firmware to OpenWrt tree
        run: |
          FW_DIR="openwrt/target/linux/qualcommax/ipq50xx/base-files/lib/firmware/ath11k"
          mkdir -p "$FW_DIR/IPQ5018/hw1.0"
          mkdir -p "$FW_DIR/QCN6122/hw1.0"

          echo "=== Copy DTS ==="
          cp -v files/dts/ipq5018-ruijie-rg-ma3063.dts "$DTS_DIR/"

          echo ""
          echo "=== Copy IPQ5018 BDF ==="
          cp -v files/firmware/ipq5018/bdwlan.* "$FW_DIR/IPQ5018/hw1.0/"
          cp -v files/firmware/ipq5018/bdwlan.b23 "$FW_DIR/IPQ5018/hw1.0/board.bin"

          echo ""
          echo "=== Copy QCN6122 BDF ==="
          cp -v files/firmware/qcn6122/bdwlan.* "$FW_DIR/QCN6122/hw1.0/"
          cp -v files/firmware/qcn6122/bdwlan.b60 "$FW_DIR/QCN6122/hw1.0/board.bin"

          echo ""
          echo "=== Copy QCN6122 DSP firmware ==="
          cp -v files/firmware/qcn6122/m3_fw.* "$FW_DIR/QCN6122/hw1.0/"
          cp -v files/firmware/qcn6122/q6_fw.* "$FW_DIR/QCN6122/hw1.0/"

          echo ""
          echo "=== Final firmware layout ==="
          find "$FW_DIR" -type f | sort

      - name: Apply patches to OpenWrt tree
        run: |
          cd openwrt

          # ── Patch 1: DTS Makefile ─────────────────────────────────────────────
          DTS_MK="$DTS_DIR/Makefile"
          echo "=== Patch 1: DTS Makefile ($DTS_MK) ==="
          if [ ! -f "$DTS_MK" ]; then
            echo "⚠️  Makefile belum ada, buat baru"
            echo 'dtb-$(CONFIG_ARCH_QCOM) += ipq5018-ruijie-rg-ma3063.dtb' > "$DTS_MK"
            echo "✅ Dibuat baru"
          elif ! grep -q "ipq5018-ruijie-rg-ma3063" "$DTS_MK"; then
            echo "before:" && grep "ipq5018" "$DTS_MK" || echo "(kosong)"
            if grep -q "ipq5018-" "$DTS_MK"; then
              sed -i "/ipq5018-.*\.dtb/a dtb-\$(CONFIG_ARCH_QCOM) += ipq5018-ruijie-rg-ma3063.dtb" "$DTS_MK"
            else
              echo 'dtb-$(CONFIG_ARCH_QCOM) += ipq5018-ruijie-rg-ma3063.dtb' >> "$DTS_MK"
            fi
            echo "after:" && grep "ipq5018" "$DTS_MK"
            echo "✅ Patched"
          else
            echo "⏭ Sudah ada, skip"
          fi

          # ── Patch 2: Device entry ──────────────────────────────────────────────
          # $DEVICE_MK di-detect di step sebelumnya, di-pass via GITHUB_ENV
          echo ""
          echo "=== Patch 2: Device entry ($DEVICE_MK) ==="
          if [ ! -f "$DEVICE_MK" ]; then
            echo "⚠️  File tidak ada, buat baru"
            mkdir -p "$(dirname $DEVICE_MK)"
            touch "$DEVICE_MK"
          fi
          if ! grep -q "ruijie_rg-ma3063" "$DEVICE_MK"; then
            cat "../files/patches/device-makefile-entry.txt" >> "$DEVICE_MK"
            echo "✅ Patched"
            grep -A5 "ruijie_rg-ma3063" "$DEVICE_MK" | head -8
          else
            echo "⏭ Sudah ada, skip"
          fi

          # ── Patch 3: 02_network ────────────────────────────────────────────────
          # $BOARD_NET di-detect di step sebelumnya, di-pass via GITHUB_ENV
          echo ""
          echo "=== Patch 3: 02_network ($BOARD_NET) ==="
          mkdir -p "$(dirname $BOARD_NET)"
          if [ ! -f "$BOARD_NET" ]; then
            echo "⚠️  File tidak ada, buat dari scratch"
            python3 -c "
          import os
          content = '#!/bin/sh\n. /lib/functions/uci-defaults.sh\n\nboard_config_update\n\nboard=$(board_name)\ncase \"$board\" in\n\truijie,rg-ma3063)\n\t\tucidef_set_interfaces_lan_wan \"lan1 lan2 lan3\" \"wan\"\n\t\t;;\nesac\n\nboard_config_flush\nexit 0\n'
          open(os.environ['BOARD_NET'], 'w').write(content)
          os.chmod(os.environ['BOARD_NET'], 0o755)
          "
            echo "✅ Dibuat baru"
            echo "✅ Dibuat baru"
          elif ! grep -q "ruijie,rg-ma3063" "$BOARD_NET"; then
            sed -i "/^esac/i\\\truijie,rg-ma3063)\n\t\tucidef_set_interfaces_lan_wan \"lan1 lan2 lan3\" \"wan\"\n\t\t;;" "$BOARD_NET"
            echo "✅ Patched"
          else
            echo "⏭ Sudah ada, skip"
          fi
          echo "--- 02_network final ---"
          cat "$BOARD_NET"


      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache toolchain
        if: inputs.clean_build != 'true'
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir/toolchain-*
            openwrt/staging_dir/host
            openwrt/build_dir/host
            openwrt/build_dir/hostpkg
          key: toolchain-25.12-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ hashFiles('openwrt/include/version.mk', 'openwrt/toolchain/Makefile') }}
          restore-keys: |
            toolchain-25.12-${{ env.TARGET }}-${{ env.SUBTARGET }}-

      - name: Generate build config
        run: |
          echo "=== Copy .config ==="
          cp -v files/config/ma3063.config openwrt/.config
          cd openwrt
          make defconfig 2>&1 | tail -3
          echo ""
          echo "=== Active config ==="
          grep -E "^CONFIG_TARGET|DEVICE_ruijie|PACKAGE_luci|PACKAGE_ath11k|PACKAGE_kmod-ath11k" .config

      - name: Build toolchain
        run: |
          cd openwrt
          echo "=== Building toolchain ==="
          make toolchain/install -j$(nproc) V=s 2>&1 | tail -5

      - name: Build firmware image
        run: |
          cd openwrt
          echo "=== Building firmware ==="
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log | \
            grep -E "make\[1\]|ERROR:|error:|WARNING:|Built target|ruijie|ath11k" || true
          echo ""
          echo "=== Output files ==="
          find bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/ \
            -maxdepth 1 -type f | sort

      - name: Verify FIT image config selector
        run: |
          BINDIR="openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}"
          ITB=$(find "$BINDIR" -name "*ruijie*initramfs*.itb" 2>/dev/null | head -1)
          if [ -z "$ITB" ]; then
            echo "initramfs .itb tidak ditemukan, skip"
            exit 0
          fi
          echo "=== FIT image: $(basename $ITB) ==="
          dumpimage -l "$ITB" | grep -E "config@|Configuration"
          echo ""
          if dumpimage -l "$ITB" | grep -q "config@mp03.5-c2"; then
            echo "OK: config@mp03.5-c2 ada"
            echo "U-Boot cmd: bootm 0x44000000#config@mp03.5-c2"
          else
            echo "WARN: config@mp03.5-c2 tidak ada, lihat daftar config di atas"
          fi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          BINDIR="openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}"
          echo "=== Collecting ==="
          find "$BINDIR" -name "*ruijie*initramfs*" -exec cp -v {} artifacts/ \;
          find "$BINDIR" -name "*ruijie*sysupgrade*" -exec cp -v {} artifacts/ \;
          cp openwrt/.config artifacts/dotconfig
          find "$BINDIR" -name "*.manifest" -exec cp -v {} artifacts/ \;
          find "$BINDIR" -name "sha256sums" -exec cp -v {} artifacts/ \;
          echo ""
          echo "=== Artifacts ==="
          ls -lh artifacts/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ruijie-rg-ma3063-${{ github.run_number }}
          path: artifacts/
          retention-days: 14

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: /tmp/build.log
          retention-days: 7
