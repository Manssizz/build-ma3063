name: Build OpenWrt — Ruijie RG-MA3063

# ==============================================================
# CATATAN TFTP BOOT (untuk test initramfs via U-Boot):
#
# U-Boot env default:
#   ipaddr   = 192.168.10.10  (IP router saat di U-Boot)
#   serverip = 192.168.10.19  (IP TFTP server / PC)
#
# Interrupt boot saat countdown, lalu:
#   setenv serverip <IP_PC_KAMU>
#   tftpboot 0x44000000 openwrt-qualcommax-ipq50xx-ruijie_rg-ma3063-initramfs-uImage.itb
#   bootm 0x44000000#config@mp03.5-c2
#
# U-Boot OEM 32-bit, ATF handle switch ke arm64.
# Confirmed: strings /dev/mtd11 -> "Jumping to AARCH64 kernel via monitor"
#
# ==============================================================
# STRUKTUR files/firmware/ YANG DIBUTUHKAN:
#
# files/firmware/
# ├── ipq5018/
# │   ├── bdwlan.bin / bdwlan.b10/b20/b21/b22/b23(*)/b24
# └── qcn6122/
#     ├── bdwlan.bin / bdwlan.b50/b60(*)/b90/bb0
#     ├── m3_fw.mdt / m3_fw.b00/b01/b02
#     └── q6_fw.mdt / q6_fw.b00~b21 (skip b06/b12)
#
# (*) = variant aktif: IPQ5018 board_id=23, QCN6122 board_id=60
# ==============================================================

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (hapus cache)'
        required: false
        default: 'false'
        type: boolean

env:
  OPENWRT_BRANCH: openwrt-24.10
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE_PROFILE: ruijie_rg-ma3063

jobs:
  build:
    name: Build OpenWrt for Ruijie RG-MA3063
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget curl libelf-dev quilt u-boot-tools

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 -b ${{ env.OPENWRT_BRANCH }} \
            https://github.com/openwrt/openwrt.git openwrt
          echo "=== OpenWrt commit ==="
          cd openwrt && git log --oneline -1

      # ── Detect path penting di OpenWrt tree ──────────────────────────────────
      # Kernel version bisa berubah antar branch (5.15 / 6.1 / dll).
      # Detect otomatis supaya tidak hardcode.
      - name: Detect OpenWrt tree paths
        run: |
          echo "=== Struktur target/linux/qualcommax/ ==="
          ls openwrt/target/linux/qualcommax/

          echo ""
          echo "=== Mencari direktori DTS qcom ==="
          DTS_DIR=$(find openwrt/target/linux/qualcommax -type d -name "qcom" \
            -path "*/boot/dts/qcom" | head -1)

          if [ -z "$DTS_DIR" ]; then
            echo "ERROR: direktori DTS qcom tidak ditemukan!"
            echo "Isi files-* yang ada:"
            find openwrt/target/linux/qualcommax -maxdepth 2 -type d | sort
            exit 1
          fi

          echo "✅ DTS dir: $DTS_DIR"
          echo "DTS_DIR=$DTS_DIR" >> $GITHUB_ENV

          echo ""
          echo "=== Mencari Makefile DTS ==="
          ls "$DTS_DIR/" | head -20

          echo ""
          echo "=== ipq50xx Makefile (cuplikan device definitions) ==="
          grep -n "define Device\|TARGET_DEVICES" \
            openwrt/target/linux/qualcommax/ipq50xx/Makefile | head -20

          echo ""
          echo "=== 02_network board config (cuplikan) ==="
          cat openwrt/target/linux/qualcommax/ipq50xx/base-files/etc/board.d/02_network

      - name: Validate required files in repo
        run: |
          echo "=== Checking required files ==="

          test -f files/dts/ipq5018-ruijie-rg-ma3063.dts \
            || (echo "MISSING: files/dts/ipq5018-ruijie-rg-ma3063.dts" && exit 1)
          test -f files/config/ma3063.config \
            || (echo "MISSING: files/config/ma3063.config" && exit 1)
          test -f files/patches/device-makefile-entry.txt \
            || (echo "MISSING: files/patches/device-makefile-entry.txt" && exit 1)
          test -f files/firmware/ipq5018/bdwlan.b23 \
            || (echo "MISSING: files/firmware/ipq5018/bdwlan.b23 (board_id 23)" && exit 1)
          test -f files/firmware/qcn6122/bdwlan.b60 \
            || (echo "MISSING: files/firmware/qcn6122/bdwlan.b60 (board_id 60)" && exit 1)
          test -f files/firmware/qcn6122/m3_fw.mdt \
            || (echo "MISSING: files/firmware/qcn6122/m3_fw.mdt" && exit 1)
          test -f files/firmware/qcn6122/q6_fw.mdt \
            || (echo "MISSING: files/firmware/qcn6122/q6_fw.mdt" && exit 1)

          echo "✅ Semua file tersedia"
          echo ""
          echo "=== files/firmware/ipq5018/ ==="
          ls -lh files/firmware/ipq5018/
          echo ""
          echo "=== files/firmware/qcn6122/ ==="
          ls -lh files/firmware/qcn6122/

      - name: Copy DTS and firmware to OpenWrt tree
        run: |
          FW_DIR="openwrt/target/linux/qualcommax/ipq50xx/base-files/lib/firmware/ath11k"

          mkdir -p "$FW_DIR/IPQ5018/hw1.0"
          mkdir -p "$FW_DIR/QCN6122/hw1.0"

          # ── DTS — pakai path yang sudah di-detect ─────────────────────────────
          echo "=== Copy DTS ke $DTS_DIR ==="
          cp -v files/dts/ipq5018-ruijie-rg-ma3063.dts "$DTS_DIR/"

          # ── IPQ5018 — semua bdwlan dari OEM ──────────────────────────────────
          echo ""
          echo "=== Copy IPQ5018 firmware ==="
          cp -v files/firmware/ipq5018/bdwlan.* "$FW_DIR/IPQ5018/hw1.0/"
          # board.bin = variant aktif (board_id 23) sebagai fallback
          cp -v files/firmware/ipq5018/bdwlan.b23 "$FW_DIR/IPQ5018/hw1.0/board.bin"

          # ── QCN6122 — semua bdwlan dari OEM ──────────────────────────────────
          echo ""
          echo "=== Copy QCN6122 BDF firmware ==="
          cp -v files/firmware/qcn6122/bdwlan.* "$FW_DIR/QCN6122/hw1.0/"
          # board.bin = variant aktif (board_id 60) sebagai fallback
          cp -v files/firmware/qcn6122/bdwlan.b60 "$FW_DIR/QCN6122/hw1.0/board.bin"

          # ── QCN6122 — DSP firmware dari OEM ──────────────────────────────────
          echo ""
          echo "=== Copy QCN6122 DSP firmware ==="
          cp -v files/firmware/qcn6122/m3_fw.* "$FW_DIR/QCN6122/hw1.0/"
          cp -v files/firmware/qcn6122/q6_fw.* "$FW_DIR/QCN6122/hw1.0/"

          echo ""
          echo "=== Final firmware layout ==="
          find "$FW_DIR" -type f | sort

      - name: Apply patches to OpenWrt tree
        run: |
          cd openwrt

          # ── Patch 1: Tambah DTB ke DTS Makefile ──────────────────────────────
          DTS_MK="$DTS_DIR/Makefile"
          echo "=== DTS Makefile: $DTS_MK ==="
          echo "--- IPQ5018 entries sebelum patch ---"
          grep "ipq5018" "$DTS_MK" || echo "(belum ada)"

          if ! grep -q "ipq5018-ruijie-rg-ma3063" "$DTS_MK"; then
            # Cari anchor — entry ipq5018 lain sebagai titik sisip
            ANCHOR=$(grep "ipq5018-linksys-mx2000\|ipq5018-" "$DTS_MK" | head -1 | \
              sed 's/^[[:space:]]*//' | cut -d' ' -f1)
            if [ -n "$ANCHOR" ]; then
              sed -i "/$ANCHOR/a dtb-\$(CONFIG_ARCH_QCOM) += ipq5018-ruijie-rg-ma3063.dtb" "$DTS_MK"
            else
              echo "dtb-\$(CONFIG_ARCH_QCOM) += ipq5018-ruijie-rg-ma3063.dtb" >> "$DTS_MK"
            fi
            echo "--- Setelah patch ---"
            grep "ipq5018" "$DTS_MK"
            echo "✅ DTS Makefile patched"
          else
            echo "⏭ DTS Makefile sudah ada, skip"
          fi

          # ── Patch 2: Device entry ke ipq50xx Makefile ─────────────────────────
          DEVICE_MK="target/linux/qualcommax/ipq50xx/Makefile"
          echo ""
          echo "=== Device Makefile patch ==="
          if ! grep -q "ruijie_rg-ma3063" "$DEVICE_MK"; then
            cat "../files/patches/device-makefile-entry.txt" >> "$DEVICE_MK"
            echo "✅ Device Makefile patched"
            echo "--- Verifikasi ---"
            grep -A5 "ruijie_rg-ma3063" "$DEVICE_MK" | head -10
          else
            echo "⏭ Device Makefile sudah ada, skip"
          fi

          # ── Patch 3: Network board config ─────────────────────────────────────
          BOARD_NET="target/linux/qualcommax/ipq50xx/base-files/etc/board.d/02_network"
          echo ""
          echo "=== Network board config patch ==="
          if ! grep -q "ruijie,rg-ma3063" "$BOARD_NET"; then
            python3 -c "
          import re
          content = open('$BOARD_NET').read()
          entry = '\t\truijie,rg-ma3063)\n\t\t\tucidef_set_interfaces_lan_wan \"lan1 lan2 lan3\" \"wan\"\n\t\t\t;;\n'
          content = re.sub(r'(^esac)', entry + r'\1', content, flags=re.MULTILINE)
          open('$BOARD_NET', 'w').write(content)
          "
            echo "✅ Network board config patched"
            echo "--- Verifikasi ---"
            grep -A3 "ruijie,rg-ma3063" "$BOARD_NET"
          else
            echo "⏭ Network board config sudah ada, skip"
          fi

      - name: Update feeds
        run: |
          cd openwrt
          echo "=== Updating feeds ==="
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "✅ Feeds updated"

      - name: Cache toolchain
        if: inputs.clean_build != 'true'
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir/toolchain-*
            openwrt/staging_dir/host
            openwrt/build_dir/host
            openwrt/build_dir/hostpkg
          # main = rolling/snapshot, key pakai hash version.mk + toolchain Makefile
          key: toolchain-24.10-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ hashFiles('openwrt/include/version.mk', 'openwrt/toolchain/Makefile') }}
          restore-keys: |
            toolchain-24.10-${{ env.TARGET }}-${{ env.SUBTARGET }}-

      - name: Generate build config
        run: |
          echo "=== Copy .config ==="
          cp -v files/config/ma3063.config openwrt/.config

          cd openwrt
          make defconfig 2>&1 | tail -5

          echo ""
          echo "=== Active config (target + packages) ==="
          grep -E "^CONFIG_TARGET|DEVICE_ruijie|PACKAGE_luci|PACKAGE_ath11k|PACKAGE_kmod-ath11k" .config

      - name: Build toolchain
        run: |
          cd openwrt
          echo "=== Building toolchain ==="
          make toolchain/install -j$(nproc) V=s 2>&1 | tail -10
          echo "✅ Toolchain done"

      - name: Build firmware image
        run: |
          cd openwrt
          echo "=== Building firmware ==="
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log | \
            grep -E "make\[1\]|ERROR:|error:|WARNING:|Built target|ruijie|ath11k" || true

          echo ""
          echo "=== Build output files ==="
          find bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/ \
            -maxdepth 1 -type f | sort

      - name: Verify FIT image config selector
        run: |
          BINDIR="openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}"
          ITB=$(find "$BINDIR" -name "*ruijie*initramfs*.itb" 2>/dev/null | head -1)

          if [ -z "$ITB" ]; then
            echo "⚠️  initramfs .itb tidak ditemukan, skip verifikasi"
            exit 0
          fi

          echo "=== FIT image: $(basename $ITB) ==="
          echo "=== Semua konfigurasi tersedia ==="
          dumpimage -l "$ITB" | grep -E "config@|Configuration"

          echo ""
          if dumpimage -l "$ITB" | grep -q "config@mp03.5-c2"; then
            echo "✅ config@mp03.5-c2 ADA — U-Boot command:"
            echo "   bootm 0x44000000#config@mp03.5-c2"
          else
            echo "⚠️  config@mp03.5-c2 TIDAK ADA!"
            echo "   Gunakan salah satu config di atas."
            echo "   Update DEVICE_DTS_CONFIG di files/patches/device-makefile-entry.txt"
          fi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          BINDIR="openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}"

          echo "=== Collecting artifacts ==="

          # Initramfs — test via TFTP, tidak menulis ke NAND
          find "$BINDIR" -name "*ruijie*initramfs*" -exec cp -v {} artifacts/ \;

          # Sysupgrade — flash permanen setelah test initramfs OK
          find "$BINDIR" -name "*ruijie*sysupgrade*" -exec cp -v {} artifacts/ \;

          cp openwrt/.config artifacts/dotconfig
          find "$BINDIR" -name "*.manifest" -exec cp -v {} artifacts/ \;
          find "$BINDIR" -name "sha256sums"  -exec cp -v {} artifacts/ \;

          echo ""
          echo "=== Final artifacts ==="
          ls -lh artifacts/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ruijie-rg-ma3063-${{ github.run_number }}
          path: artifacts/
          retention-days: 14

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: /tmp/build.log
          retention-days: 7
