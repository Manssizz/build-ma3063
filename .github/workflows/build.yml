name: Build OpenWrt — Ruijie RG-MA3063

# ==============================================================
# CATATAN TFTP BOOT (untuk test initramfs via U-Boot):
#
# U-Boot env default:
#   ipaddr   = 192.168.10.10  (IP router saat di U-Boot)
#   serverip = 192.168.10.19  (IP TFTP server / PC)
#
# Interrupt boot saat countdown, lalu:
#   setenv serverip <IP_PC_KAMU>
#   tftpboot 0x44000000 openwrt-qualcommax-ipq50xx-ruijie_rg-ma3063-initramfs-uImage.itb
#   bootm 0x44000000#config@mp03.5-c2
#
# U-Boot OEM 32-bit, ATF (TrustZone) handle switch ke arm64.
# Confirmed: strings /dev/mtd11 -> "Jumping to AARCH64 kernel via monitor"
# ==============================================================

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (hapus cache)'
        required: false
        default: 'false'
        type: boolean

env:
  OPENWRT_BRANCH: openwrt-23.05
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE_PROFILE: ruijie_rg-ma3063

jobs:
  build:
    name: Build OpenWrt for Ruijie RG-MA3063
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget curl libelf-dev quilt u-boot-tools

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 -b ${{ env.OPENWRT_BRANCH }} \
            https://github.com/openwrt/openwrt.git openwrt
          echo "Commit: $(cd openwrt && git log --oneline -1)"

      # ── Download QCN6122 DSP firmware dari ath11k-firmware repo ──────────────
      # PENTING: q6_fw/m3_fw HARUS dari repo ini, BUKAN dari OEM.
      # OEM pakai kernel 4.4 armv7 — DSP firmware bisa mismatch dengan
      # ath11k driver di kernel 6.1 arm64 → WiFi 5GHz tidak jalan.
      #
      # Yang TETAP dari OEM (board-specific, tidak bisa diganti):
      #   files/firmware/ipq5018/board.bin ← bdwlan.b23 (board_id 23)
      #   files/firmware/qcn6122/board.bin ← bdwlan.b60 (board_id 60)
      - name: Download QCN6122 DSP firmware (ath11k-firmware)
        run: |
          git clone --depth=1 https://github.com/kvalo/ath11k-firmware.git
          echo "ath11k-firmware: $(cd ath11k-firmware && git log --oneline -1)"
          ls -lh ath11k-firmware/QCN6122/hw1.0/

      - name: Validate required files
        run: |
          echo "=== Checking required files ==="
          test -f files/dts/ipq5018-ruijie-rg-ma3063.dts      || (echo "MISSING: DTS file" && exit 1)
          test -f files/firmware/ipq5018/board.bin             || (echo "MISSING: IPQ5018 board.bin (rename bdwlan.b23)" && exit 1)
          test -f files/firmware/qcn6122/board.bin             || (echo "MISSING: QCN6122 board.bin (rename bdwlan.b60)" && exit 1)
          test -f files/config/ma3063.config                   || (echo "MISSING: files/config/ma3063.config" && exit 1)
          test -f files/patches/device-makefile-entry.txt      || (echo "MISSING: files/patches/device-makefile-entry.txt" && exit 1)
          echo "✅ Semua file tersedia"

      - name: Copy DTS and firmware to OpenWrt tree
        run: |
          FW_DIR="openwrt/target/linux/qualcommax/ipq50xx/base-files/lib/firmware/ath11k"
          DTS_DIR="openwrt/target/linux/qualcommax/files-6.1/arch/arm64/boot/dts/qcom"

          mkdir -p "$FW_DIR/IPQ5018/hw1.0"
          mkdir -p "$FW_DIR/QCN6122/hw1.0"

          # DTS
          cp files/dts/ipq5018-ruijie-rg-ma3063.dts "$DTS_DIR/"

          # IPQ5018 BDF (dari OEM, board-specific)
          cp files/firmware/ipq5018/board.bin "$FW_DIR/IPQ5018/hw1.0/board.bin"

          # QCN6122 BDF (dari OEM, board-specific)
          cp files/firmware/qcn6122/board.bin "$FW_DIR/QCN6122/hw1.0/board.bin"

          # QCN6122 DSP firmware (dari ath11k-firmware repo)
          cp ath11k-firmware/QCN6122/hw1.0/q6_fw.mdt "$FW_DIR/QCN6122/hw1.0/"
          cp ath11k-firmware/QCN6122/hw1.0/m3_fw.mdt "$FW_DIR/QCN6122/hw1.0/"
          find ath11k-firmware/QCN6122/hw1.0/ -name "q6_fw.b*" -exec cp {} "$FW_DIR/QCN6122/hw1.0/" \;
          find ath11k-firmware/QCN6122/hw1.0/ -name "m3_fw.b*" -exec cp {} "$FW_DIR/QCN6122/hw1.0/" \;

          echo "=== Firmware layout ==="
          find "$FW_DIR" -type f | sort

      - name: Apply patches to OpenWrt tree
        run: |
          cd openwrt

          # ── Patch 1: Tambah DTB ke DTS Makefile ──────────────────────────────
          DTS_MK="target/linux/qualcommax/files-6.1/arch/arm64/boot/dts/qcom/Makefile"
          if ! grep -q "ipq5018-ruijie-rg-ma3063" "$DTS_MK"; then
            sed -i '/ipq5018-linksys-mx2000/a dtb-$(CONFIG_ARCH_QCOM) += ipq5018-ruijie-rg-ma3063.dtb' "$DTS_MK"
            echo "✅ DTS Makefile patched"
          else
            echo "⏭ DTS Makefile sudah ada, skip"
          fi

          # ── Patch 2: Tambah device entry ke ipq50xx Makefile ─────────────────
          # Konten ada di files/patches/device-makefile-entry.txt
          # untuk menghindari masalah heredoc di YAML
          DEVICE_MK="target/linux/qualcommax/ipq50xx/Makefile"
          if ! grep -q "ruijie_rg-ma3063" "$DEVICE_MK"; then
            cat "../files/patches/device-makefile-entry.txt" >> "$DEVICE_MK"
            echo "✅ Device Makefile patched"
          else
            echo "⏭ Device Makefile sudah ada, skip"
          fi

          # ── Patch 3: Tambah network board config ─────────────────────────────
          # eth0=WAN (dp1, IPQ5018 GE PHY), eth1-3=LAN (dp2-4, QCA8337)
          BOARD_NET="target/linux/qualcommax/ipq50xx/base-files/etc/board.d/02_network"
          if ! grep -q "ruijie,rg-ma3063" "$BOARD_NET"; then
            python3 -c "
          import re, sys
          content = open('$BOARD_NET').read()
          entry = '\t\truijie,rg-ma3063)\n\t\t\tucidef_set_interfaces_lan_wan \"lan1 lan2 lan3\" \"wan\"\n\t\t\t;;\n'
          content = re.sub(r'(^esac)', entry + r'\1', content, flags=re.MULTILINE)
          open('$BOARD_NET', 'w').write(content)
          "
            echo "✅ Network board config patched"
          else
            echo "⏭ Network board config sudah ada, skip"
          fi

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache toolchain
        if: inputs.clean_build != 'true'
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir/toolchain-*
            openwrt/staging_dir/host
            openwrt/build_dir/host
            openwrt/build_dir/hostpkg
          key: toolchain-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ hashFiles('openwrt/include/version.mk') }}
          restore-keys: |
            toolchain-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-

      - name: Generate build config
        run: |
          # Copy .config dari file repo, hindari heredoc di YAML
          cp files/config/ma3063.config openwrt/.config
          cd openwrt && make defconfig
          echo "=== Active device config ==="
          grep -E "^CONFIG_TARGET|DEVICE_ruijie|PACKAGE_luci|PACKAGE_ath11k|PACKAGE_kmod-ath11k" .config

      - name: Build toolchain
        run: |
          cd openwrt
          make toolchain/install -j$(nproc) V=s 2>&1 | tail -5

      - name: Build firmware image
        run: |
          cd openwrt
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log | \
            grep -E "make\[1\]|ERROR:|error:|WARNING:|Built target|ruijie" || true

      # ── Verifikasi config selector FIT image ──────────────────────────────────
      # config@mp03.5-c2 = asumsi dari referensi MX2000/MX5500.
      # Kalau tidak ada di .itb output → update DEVICE_DTS_CONFIG dan bootm cmd.
      - name: Verify FIT image config selector
        run: |
          BINDIR="openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}"
          ITB=$(find "$BINDIR" -name "*ruijie*initramfs*.itb" 2>/dev/null | head -1)

          if [ -z "$ITB" ]; then
            echo "⚠️  initramfs .itb tidak ditemukan, skip"
            exit 0
          fi

          echo "=== FIT image configs ==="
          dumpimage -l "$ITB" | grep "config@"

          if dumpimage -l "$ITB" | grep -q "config@mp03.5-c2"; then
            echo "✅ config@mp03.5-c2 ADA — U-Boot bootm command sudah benar"
          else
            echo "⚠️  config@mp03.5-c2 TIDAK ADA!"
            echo "   Lihat daftar config di atas, update DEVICE_DTS_CONFIG"
            echo "   di files/patches/device-makefile-entry.txt lalu rebuild."
          fi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          BINDIR="openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}"

          # Initramfs — test via TFTP, TIDAK menulis ke NAND
          find "$BINDIR" -name "*ruijie*initramfs*" -exec cp {} artifacts/ \;

          # Sysupgrade — flash permanen setelah test initramfs OK
          find "$BINDIR" -name "*ruijie*sysupgrade*" -exec cp {} artifacts/ \;

          cp openwrt/.config artifacts/dotconfig
          find "$BINDIR" -name "*.manifest" -exec cp {} artifacts/ \;
          find "$BINDIR" -name "sha256sums"  -exec cp {} artifacts/ \;

          # Info ath11k firmware yang dipakai
          cd ath11k-firmware
          echo "ath11k-firmware commit: $(git log --oneline -1)" > ../artifacts/ath11k_fw_info.txt
          ls -lh QCN6122/hw1.0/ >> ../artifacts/ath11k_fw_info.txt
          cd ..

          echo "=== Artifacts ==="
          ls -lh artifacts/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ruijie-rg-ma3063-${{ github.run_number }}
          path: artifacts/
          retention-days: 14

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: /tmp/build.log
          retention-days: 7
